apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alloy-collector
  namespace: argo
spec:
  project: default
  sources:
    - repoURL: https://grafana.github.io/helm-charts
      chart: alloy
      targetRevision: 1.7.0
      helm:
        valueFiles:
          - $values/alloy/values.yml
    - repoURL: https://github.com/hhertout/homelab.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: false
      selfHeal: true