apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kafka-crds
  namespace: argo
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  source:
    repoURL: https://github.com/hhertout/homelab.git
    targetRevision: main
    path: kafka/crds/
  destination:
    server: https://kubernetes.default.svc
    namespace: kafka
  syncPolicy:
    automated:
      prune: false
      selfHeal: true