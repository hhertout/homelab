apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kafka-crds
  namespace: argo
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  source:
    repoURL: quay.io/strimzi-helm
    chart: strimzi-kafka-operator
    targetRevision: 0.45.2
  destination:
    server: https://kubernetes.default.svc
    namespace: kafka
  syncPolicy:
    automated:
      prune: false
      selfHeal: true