apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kafka-resources
  namespace: argo
spec:
  project: default
  source:
    repoURL: https://github.com/hhertout/homelab.git
    path: kafka/resources
  destination:
    server: https://kubernetes.default.svc
    namespace: kafka
  syncPolicy:
    automated:
      prune: true
      selfHeal: true