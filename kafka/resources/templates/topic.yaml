{{- range .Values.topics }}
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: {{ .name }}
  labels:
    strimzi.io/cluster: {{ $.Values.clusterName }}
spec:
  partitions: {{ .partitions | default 1 }}
  replicas: {{ .replicas | default 1 }}
  config:
    retention.ms: {{ .retentionMs | default "604800000" | quote }}
    min.insync.replicas: {{ .minInsyncReplicas | default 1 | quote }}
    {{- if .config }}
    {{- toYaml .config | nindent 4 }}
    {{- end }}
{{- end }}
