apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-dashboard
  namespace: kube-system
  annotations:
    cert-manager.io/cluster-issuer: {{ .Values.letsencrypt.issuer }}
spec:
  entryPoints:
    - websecure
  routes:
    - match: "Host(`{{ .Values.traefik.dashboardDomain }}`) && (PathPrefix(`/dashboard`) || PathPrefix(`/api`))"
      kind: Rule
      middlewares:
        - name: dashboard-auth
          namespace: kube-system
        - name: security-headers
          namespace: kube-system
      services:
        - name: api@internal
          kind: TraefikService
  tls:
    secretName: traefik-dashboard-tls
    domains:
      - main: {{ .Values.traefik.dashboardDomain }}
